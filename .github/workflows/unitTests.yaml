name: Eslint Check
# This workflow runs ESLint to check for code quality issues on pull requests.
on: pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
      - run: npm ci
      - run: npm run lint:check