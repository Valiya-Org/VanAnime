name: PR Basic Check
on: pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
      - name: Check dependencies
        id: install-deps
        run: |
          if ! npm ci; then
            echo "::error::依赖安装失败，请检查 package.json 和 package-lock.json 是否一致"
            exit 1
          fi
      - name: Check ESLint
        run: npm run lint:check
      - name: Run Unit Tests
        run: npm run test-ci